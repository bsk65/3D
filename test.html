<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Firebase Test</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  body { font-family: monospace; padding: 20px; background: #111; color: #0f0; }
  .ok { color: #0f0; } .err { color: #f00; } .warn { color: #ff0; }
  button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 16px; }
  #log { white-space: pre-wrap; }
</style>
</head>
<body>
<h2>Firebase Diagnostik</h2>
<button onclick="testAuth()">1. Test Login</button>
<button onclick="testCourses()">2. Test Baner</button>
<button onclick="testFriends()">3. Test Venner</button>
<button onclick="testRounds()">4. Test Runder</button>
<button onclick="testWrite()">5. Test Gem runde</button>
<div id="log"></div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD6jfZeueaQfBhlI5Mz6766c3k--gCwIjc",
  authDomain: "archery-app-70e20.firebaseapp.com",
  projectId: "bueskydning-app-70e20",
  storageBucket: "archery-app-70e20.firebasestorage.app",
  messagingSenderId: "1025324581093",
  appId: "1:1025324581093:web:03b41dbee9cc81c6eb540c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function log(msg, type='ok') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</span>\n`;
}

auth.onAuthStateChanged(u => {
  if (u) log(`✅ Logget ind som: ${u.email}`);
  else log('⚠️ Ikke logget ind - log ind på appen først', 'warn');
});

async function testAuth() {
  log('--- Test login ---');
  const t = Date.now();
  auth.onAuthStateChanged(u => {
    if (u) log(`✅ Auth OK (${Date.now()-t}ms): ${u.email}`);
    else log('❌ Ikke logget ind', 'err');
  });
}

async function testCourses() {
  log('--- Test baner (kurser) ---');
  try {
    const t = Date.now();
    const snap = await db.collection('kurser').get();
    log(`✅ Baner OK (${Date.now()-t}ms): ${snap.docs.length} baner fundet`);
    snap.docs.forEach(d => log(`  - ${d.data().yam || d.data().name || d.id}`));
  } catch(e) { log(`❌ Baner fejl: ${e.message}`, 'err'); }
}

async function testFriends() {
  log('--- Test venner ---');
  const u = auth.currentUser;
  if (!u) { log('❌ Log ind først', 'err'); return; }
  try {
    const t = Date.now();
    const snap = await db.collection('brugere').doc(u.uid).collection('venner').get();
    log(`✅ Venner OK (${Date.now()-t}ms): ${snap.docs.length} venner`);
    snap.docs.forEach(d => log(`  - ${d.data().yam || d.data().name || d.id}`));
  } catch(e) { log(`❌ Venner fejl: ${e.message}`, 'err'); }
}

async function testRounds() {
  log('--- Test runder ---');
  const u = auth.currentUser;
  if (!u) { log('❌ Log ind først', 'err'); return; }
  try {
    const t = Date.now();
    const snap = await db.collection('brugere').doc(u.uid).collection('runder').get();
    log(`✅ Runder OK (${Date.now()-t}ms): ${snap.docs.length} runder`);
    snap.docs.forEach(d => log(`  - ${d.data().name || d.id}`));
  } catch(e) { log(`❌ Runder fejl: ${e.message}`, 'err'); }
}

async function testWrite() {
  log('--- Test gem aktiv runde ---');
  const u = auth.currentUser;
  if (!u) { log('❌ Log ind først', 'err'); return; }
  try {
    const t = Date.now();
    await db.collection('brugere').doc(u.uid).collection('aktiv').doc('test').set({test: true, ts: Date.now()});
    log(`✅ Skrivning OK (${Date.now()-t}ms)`);
    await db.collection('brugere').doc(u.uid).collection('aktiv').doc('test').delete();
    log('✅ Sletning OK');
  } catch(e) { log(`❌ Skrivning fejl: ${e.message}`, 'err'); }
}
</script>
</body>
</html>
