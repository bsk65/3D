<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body{background:#0f1f0f;color:#f2ead8;font-family:sans-serif;padding:20px;max-width:400px;margin:0 auto;}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:12px;}
.amber{background:#e8a020;color:#1a2e1a;}
.red{background:#c0392b;color:white;}
.green{background:#27ae60;color:white;}
#screen1,#screen2{padding:16px;border-radius:8px;}
#screen2{display:none;background:#1e331e;border:2px solid #e8a020;}
#log{background:#111;padding:10px;border-radius:6px;font-size:12px;min-height:60px;margin-top:10px;}
</style>
</head>
<body>

<div id="screen1">
  <h2>Scoring Skærm</h2>
  <p>Tryk på knappen for at afslutte og skifte skærm</p>
  <button class="btn amber" id="finish-btn" data-confirm="0" onclick="tapFinish()">AFSLUT NU</button>
  <div id="log">Log:</div>
</div>

<div id="screen2">
  <h2>✅ Resultat Skærm</h2>
  <p>Det virkede! Skærmen skiftede korrekt.</p>
  <button class="btn green" onclick="goBack()">← TILBAGE</button>
</div>

<script>
function log(msg){
  document.getElementById('log').innerHTML += '<br>' + msg;
}

function tapFinish(){
  var btn = document.getElementById('finish-btn');
  if(btn.getAttribute('data-confirm') === '1'){
    log('2. tryk - kalder doFinish()');
    doFinish();
  } else {
    log('1. tryk - venter på bekræftelse');
    btn.textContent = 'BEKRÆFT?';
    btn.className = 'btn amber';
    btn.style.background = '#f5c842';
    btn.setAttribute('data-confirm','1');
    setTimeout(function(){
      if(btn.getAttribute('data-confirm')==='1'){
        btn.textContent = 'AFSLUT NU';
        btn.setAttribute('data-confirm','0');
        log('Timeout - nulstillet');
      }
    }, 3000);
  }
}

function doFinish(){
  log('doFinish() kaldt - skifter skærm om 50ms');
  setTimeout(function(){
    log('setTimeout kører - skifter nu');
    document.getElementById('screen1').style.display = 'none';
    document.getElementById('screen2').style.display = 'block';
    window.scrollTo(0,0);
    log('Færdig');
  }, 50);
}

function goBack(){
  document.getElementById('screen2').style.display = 'none';
  document.getElementById('screen1').style.display = 'block';
  document.getElementById('finish-btn').textContent = 'AFSLUT NU';
  document.getElementById('finish-btn').setAttribute('data-confirm','0');
  document.getElementById('log').innerHTML = 'Log:';
}
</script>
</body>
</html>
