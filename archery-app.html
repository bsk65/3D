<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f1f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>3D Bueskydning</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="logo-icon">🏹</span>
        <h1>3D Bueskydning</h1>
      </div>
      <div id="auth-tabs" class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Log ind</button>
        <button class="auth-tab" data-tab="signup">Opret konto</button>
      </div>
      <div id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
        <input type="password" id="login-password" placeholder="Kodeord" autocomplete="current-password" />
        <button id="login-btn" class="btn-primary">Log ind</button>
        <button id="forgot-btn" class="btn-link">Glemt kodeord?</button>
      </div>
      <div id="signup-form" class="auth-form hidden">
        <input type="text" id="signup-name" placeholder="Navn" autocomplete="name" />
        <input type="email" id="signup-email" placeholder="Email" autocomplete="email" />
        <input type="password" id="signup-password" placeholder="Kodeord (min. 6 tegn)" autocomplete="new-password" />
        <button id="signup-btn" class="btn-primary">Opret konto</button>
      </div>
      <div id="auth-error" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- MAIN APP SCREEN -->
  <div id="app-screen" class="screen hidden">
    <!-- HEADER -->
    <header id="app-header">
      <button id="logo-btn" class="header-logo" title="QR-kode">🏹 <span>3D Bue</span></button>
      <div id="user-info">
        <span id="admin-badge" class="admin-badge hidden">ADMIN</span>
        <span id="header-username"></span>
      </div>
      <button id="lang-toggle" class="btn-icon" title="Language">DA</button>
      <button id="logout-btn" class="btn-icon" title="Log ud">⏻</button>
    </header>

    <!-- TABS CONTENT -->
    <main id="app-main">
      <!-- SCORING TAB -->
      <div id="tab-scoring" class="tab-content active">
        <div id="scoring-setup" class="panel">
          <h2 class="panel-title" data-i18n="newRound">Ny Runde</h2>
          <div class="form-group">
            <label data-i18n="roundName">Rundenavn</label>
            <input type="text" id="round-name" value="Min Skydning" />
          </div>
          <div class="form-group">
            <label data-i18n="selectCourse">Vælg bane</label>
            <select id="course-select">
              <option value="">— Vælg bane —</option>
            </select>
          </div>
          <div class="divider-text" data-i18n="or">eller</div>
          <div class="form-group">
            <label data-i18n="targetCount">Antal mål</label>
            <div class="btn-group" id="target-count-group">
              <button class="btn-count" data-count="6">6</button>
              <button class="btn-count" data-count="12">12</button>
              <button class="btn-count active" data-count="24">24</button>
              <button class="btn-count" data-count="30">30</button>
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="participants">Deltagere</label>
            <div id="participants-list"></div>
            <div class="participant-add">
              <input type="text" id="friend-search" placeholder="Søg vен..." autocomplete="off" />
              <div id="friend-autocomplete" class="autocomplete-list hidden"></div>
            </div>
            <div id="quick-friends" class="quick-friends"></div>
            <button id="add-guest-btn" class="btn-secondary btn-sm" data-i18n="addGuest">+ Tilføj gæst</button>
          </div>
          <div class="form-group">
            <label data-i18n="gpsOptions">GPS-indstillinger</label>
            <div class="form-group-inline">
              <label>Startmål:</label>
              <select id="start-target-select"><option value="1">1</option></select>
            </div>
            <label class="toggle-label">
              <input type="checkbox" id="gps-auto-find" />
              <span class="toggle-slider"></span>
              <span data-i18n="autoFindNearest">Auto-find nærmeste mål</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="gps-track-route" />
              <span class="toggle-slider"></span>
              <span data-i18n="trackRoute">Spor rute og tid</span>
            </label>
          </div>
          <button id="start-round-btn" class="btn-primary btn-large" data-i18n="startRound">Start runde</button>
        </div>

        <!-- ACTIVE SHOOTING PANEL -->
        <div id="scoring-active" class="panel hidden">
          <div id="shooting-top-bar" class="sticky-top">
            <div class="target-info">
              <span id="current-target-display"></span>
              <span id="round-name-badge" class="badge"></span>
            </div>
            <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
            <div id="stats-bar">
              <span><span data-i18n="avg">Gns.</span> <strong id="stat-avg">0.0</strong></span>
              <span><span data-i18n="total">Total</span> <strong id="stat-total">0</strong></span>
              <span><span data-i18n="remaining">Tilbage</span> <strong id="stat-remaining">0</strong> <span data-i18n="targets">mål</span></span>
            </div>
          </div>
          <div id="shooting-scroll-area">
            <div id="animal-header">
              <span id="animal-name-display"></span>
              <button id="edit-target-btn" class="btn-icon admin-only hidden" title="Rediger mål">✏️</button>
            </div>
            <div id="shooters-list"></div>
            <div id="target-avg-display"></div>
            <div id="animal-image-wrap">
              <img id="animal-image" src="" alt="" class="hidden" />
            </div>
          </div>
          <div id="edit-target-panel" class="slide-panel hidden">
            <h3>Rediger mål</h3>
            <input type="text" id="edit-target-name" placeholder="Navn på dyr" />
            <div class="btn-row">
              <button id="edit-photo-btn" class="btn-secondary">📷 Tag billede</button>
              <button id="edit-gps-btn" class="btn-secondary">📍 Gem GPS</button>
            </div>
            <input type="file" id="photo-input" accept="image/*" capture="environment" class="hidden" />
            <div class="btn-row">
              <button id="edit-save-btn" class="btn-primary">Gem</button>
              <button id="edit-cancel-btn" class="btn-secondary">Annuller</button>
            </div>
          </div>
          <div id="gps-bar" class="gps-bar hidden">
            <span id="gps-time">00:00</span>
            <span id="gps-distance">0 m</span>
            <span id="gps-coord"></span>
            <button id="gps-pause-btn" class="btn-icon">⏸</button>
          </div>
          <div id="shooting-bottom-bar" class="sticky-bottom">
            <div class="nav-row">
              <button id="prev-btn" class="btn-nav">← TILBAGE</button>
              <button id="skip-btn" class="btn-secondary btn-sm">⤵ SPRING</button>
              <button id="next-btn" class="btn-nav btn-primary">NÆSTE →</button>
            </div>
            <div class="action-row">
              <button id="finish-now-btn" class="btn-warning">✓ AFSLUT NU</button>
              <button id="abort-btn" class="btn-danger">🗑 AFBRYD</button>
            </div>
          </div>
        </div>

        <!-- RESULTS PANEL -->
        <div id="scoring-results" class="panel hidden">
          <div id="results-winner"></div>
          <div id="results-table-wrap"></div>
          <div id="results-distribution"></div>
          <div class="btn-row">
            <button id="send-email-btn" class="btn-secondary" data-i18n="sendEmail">📧 Send email</button>
            <button id="new-round-btn" class="btn-primary" data-i18n="newRound">Ny runde</button>
          </div>
        </div>
      </div>

      <!-- RESULTS TAB -->
      <div id="tab-results" class="tab-content hidden">
        <h2 class="panel-title" data-i18n="myRounds">Mine runder</h2>
        <div id="rounds-list"></div>
      </div>

      <!-- COURSES TAB -->
      <div id="tab-courses" class="tab-content hidden">
        <div id="courses-list-view">
          <div class="tab-header">
            <h2 class="panel-title" data-i18n="courses">Baner</h2>
            <button id="create-course-btn" class="btn-primary btn-sm">+ Opret bane</button>
          </div>
          <div id="courses-list"></div>
        </div>
        <div id="course-detail-view" class="hidden">
          <div class="tab-header">
            <button id="back-to-courses-btn" class="btn-icon">←</button>
            <h2 id="course-detail-title" class="panel-title"></h2>
          </div>
          <div class="subtabs">
            <button class="subtab active" data-subtab="map" data-i18n="map">Kort</button>
            <button class="subtab" data-subtab="visits" data-i18n="visits">Besøg</button>
            <button class="subtab" data-subtab="edit" data-i18n="edit">Rediger</button>
          </div>
          <div id="subtab-map" class="subtab-content active">
            <div id="course-map" style="height:300px;"></div>
            <label class="toggle-label">
              <input type="checkbox" id="show-my-pos" />
              <span class="toggle-slider"></span>
              <span data-i18n="showMyPos">📍 Vis min position</span>
            </label>
          </div>
          <div id="subtab-visits" class="subtab-content hidden">
            <div id="visits-list"></div>
          </div>
          <div id="subtab-edit" class="subtab-content hidden">
            <div id="course-edit-form"></div>
            <button id="delete-course-btn" class="btn-danger" data-i18n="deleteCourse">🗑 Slet bane</button>
          </div>
        </div>
        <div id="create-course-modal" class="modal hidden">
          <div class="modal-content">
            <h3 data-i18n="createCourse">Opret bane</h3>
            <input type="text" id="new-course-name" placeholder="Banenavn" />
            <div class="btn-group" id="new-course-targets">
              <button class="btn-count" data-count="6">6</button>
              <button class="btn-count active" data-count="12">12</button>
              <button class="btn-count" data-count="24">24</button>
              <button class="btn-count" data-count="30">30</button>
            </div>
            <input type="text" id="new-course-location" placeholder="Lokation (fx by)" />
            <div class="btn-row">
              <button id="create-course-confirm-btn" class="btn-primary" data-i18n="create">Opret</button>
              <button id="create-course-cancel-btn" class="btn-secondary" data-i18n="cancel">Annuller</button>
            </div>
          </div>
        </div>
      </div>

      <!-- FRIENDS TAB -->
      <div id="tab-friends" class="tab-content hidden">
        <div class="tab-header">
          <h2 class="panel-title" data-i18n="friends">Venner</h2>
          <button id="add-friend-btn" class="btn-primary btn-sm">+ Tilføj ven</button>
        </div>
        <div id="friends-list"></div>
        <div id="admin-section" class="admin-only hidden">
          <h3 data-i18n="adminSection">Administrator</h3>
          <div class="form-group">
            <input type="email" id="admin-email-input" placeholder="Email til ny admin" />
            <button id="add-admin-btn" class="btn-secondary btn-sm">Tilføj admin</button>
          </div>
          <h4 data-i18n="allUsers">Alle brugere</h4>
          <div id="users-list"></div>
        </div>
        <div id="friend-modal" class="modal hidden">
          <div class="modal-content">
            <h3 id="friend-modal-title">Tilføj ven</h3>
            <input type="text" id="friend-name" placeholder="Navn" />
            <input type="email" id="friend-email" placeholder="Email" />
            <input type="tel" id="friend-phone" placeholder="Telefon" />
            <input type="text" id="friend-club" placeholder="Klub" />
            <select id="friend-bow-type">
              <option value="">Buetype...</option>
              <option>Recurve</option>
              <option>Compound</option>
              <option>Longbow</option>
              <option>Barebow</option>
            </select>
            <div class="btn-row">
              <button id="save-friend-btn" class="btn-primary">Gem</button>
              <button id="cancel-friend-btn" class="btn-secondary">Annuller</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="scoring">
        <span class="nav-icon">🎯</span>
        <span class="nav-label" data-i18n="scoring">POINT</span>
      </button>
      <button class="nav-btn" data-tab="results">
        <span class="nav-icon">📊</span>
        <span class="nav-label" data-i18n="results">RESULTATER</span>
      </button>
      <button class="nav-btn" data-tab="courses">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label" data-i18n="courses">BANER</span>
      </button>
      <button class="nav-btn" data-tab="friends">
        <span class="nav-icon">👥</span>
        <span class="nav-label" data-i18n="friends">VENNER</span>
      </button>
    </nav>
  </div>

  <!-- QR MODAL -->
  <div id="qr-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Bjarne Klausen</h3>
      <p>+45 91 89 17 00</p>
      <canvas id="qr-canvas"></canvas>
      <button id="close-qr-btn" class="btn-secondary">Luk</button>
    </div>
  </div>

  <!-- IMAGE FULLSCREEN -->
  <div id="image-fullscreen" class="fullscreen-overlay hidden">
    <button id="close-fullscreen-btn" class="btn-icon close-btn">✕</button>
    <img id="fullscreen-image" src="" alt="" />
  </div>

  <!-- SKIP MODAL -->
  <div id="skip-modal" class="modal hidden">
    <div class="modal-content">
      <h3 data-i18n="jumpToTarget">Hop til mål</h3>
      <input type="number" id="skip-target-input" min="1" />
      <div class="btn-row">
        <button id="skip-confirm-btn" class="btn-primary">Hop</button>
        <button id="skip-cancel-btn" class="btn-secondary">Annuller</button>
      </div>
    </div>
  </div>

  <!-- GUEST MODAL -->
  <div id="guest-modal" class="modal hidden">
    <div class="modal-content">
      <h3 data-i18n="addGuest">Tilføj gæst</h3>
      <input type="text" id="guest-name-input" placeholder="Gæstens navn" />
      <div class="btn-row">
        <button id="guest-confirm-btn" class="btn-primary">Tilføj</button>
        <button id="guest-cancel-btn" class="btn-secondary">Annuller</button>
      </div>
    </div>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
    window.__firebaseModules = { initializeApp, getAuth, getFirestore, getStorage };
    const ev = new Event("firebase-modules-ready");
    document.dispatchEvent(ev);
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
